name: CSS Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-css:
    name: CSS Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Run CSS lint
        run: npm run lint:css
